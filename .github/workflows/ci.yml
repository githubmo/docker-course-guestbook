name: build-scan-sign
on:
  push:
    branches: [main]
permissions:
  contents: read
  id-token: write        # keyless cosign via OIDC
jobs:
  ship:
    runs-on: ubuntu-latest
    environment: main     # DOCKERHUB_TOKEN is stored in the 'main' environment
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: mzawi
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: sigstore/cosign-installer@v3
      - name: Scan for critical CVEs (gate)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: mzawi/guestbook:${{ github.sha }}
          exit-code: true
          only-severities: critical
        continue-on-error: true   # remove once the Tomcat pin is in place
      - name: Build, push, attest (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            mzawi/guestbook:${{ github.sha }}
            mzawi/guestbook:final
          sbom: true
          provenance: mode=max
      - name: Sign the image (keyless)
        run: cosign sign --yes mzawi/guestbook@${{ steps.build.outputs.digest }}

# Defaults are for running the jar directly against a local Postgres.
# docker-compose overrides the URL/credentials via SPRING_DATASOURCE_* env vars.
spring.datasource.url=jdbc:postgresql://localhost:5432/guestbook
spring.datasource.username=demo
spring.datasource.password=demo

# Run schema.sql on every startup (CREATE TABLE IF NOT EXISTS keeps it idempotent).
spring.sql.init.mode=always
